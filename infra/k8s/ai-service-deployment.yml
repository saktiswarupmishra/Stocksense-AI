apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: stocksense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: stocksense/ai-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          envFrom:
            - configMapRef:
                name: stocksense-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: stocksense
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
