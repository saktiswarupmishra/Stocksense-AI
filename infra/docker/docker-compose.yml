version: '3.9'

services:
  # ── Frontend ──
  frontend:
    build: ../../frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NEXT_PUBLIC_AI_URL=http://ai-service:8000
    depends_on:
      - backend
      - ai-service
    networks:
      - stocksense

  # ── Backend ──
  backend:
    build: ../../backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stocksense
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_SERVERS=kafka:9092
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=stocksense-super-secret-key-that-is-at-least-256-bits-long-for-hs256
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - stocksense

  # ── AI Service ──
  ai-service:
    build: ../../ai-service
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stocksense
      - REDIS_URL=redis://redis:6379
      - WEAVIATE_URL=http://weaviate:8090
    depends_on:
      - mongodb
      - redis
    networks:
      - stocksense

  # ── MongoDB ──
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - stocksense

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stocksense

  # ── Kafka + Zookeeper ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - stocksense

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - stocksense

  # ── Weaviate (Vector DB) ──
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    ports:
      - "8090:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - stocksense

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - stocksense

  # ── Grafana ──
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - stocksense

volumes:
  mongodb_data:
  redis_data:
  weaviate_data:
  grafana_data:

networks:
  stocksense:
    driver: bridge
