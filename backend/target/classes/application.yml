server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: stocksense-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/stocksense}
      auto-index-creation: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 5000

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: stocksense-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.stocksense.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"

app:
  jwt:
    secret: ${JWT_SECRET:stocksense-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
  
  rate-limit:
    requests-per-minute: 100

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.stocksense: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
